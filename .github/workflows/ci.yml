name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: corepack pnpm@11.0.8 --dir webui install
      - run: corepack pnpm@11.0.8 --dir webui typecheck
      - run: corepack pnpm@11.0.8 --dir webui test
      - run: corepack pnpm@11.0.8 --dir webui build
      - run: bash scripts/test-install-script.sh

  tauri:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: corepack pnpm@11.0.8 --dir webui install
      - run: corepack pnpm@11.0.8 --dir webui test
      - run: corepack pnpm@11.0.8 --dir webui build:tauri
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  linux-tauri:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Linux Tauri deps
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            xdg-utils \
            xvfb \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev
          sudo apt-get install -y --no-install-recommends libfuse2 \
            || sudo apt-get install -y --no-install-recommends libfuse2t64 \
            || true
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: corepack pnpm@11.0.8 --dir webui install
      - run: corepack pnpm@11.0.8 --dir webui build:tauri
      - run: TAURI_CONFIG='{"bundle":{"resources":["resources/nexushubd"]}}' cargo test --manifest-path src-tauri/Cargo.toml
      - run: TAURI_CONFIG='{"bundle":{"resources":["resources/nexushubd"]}}' cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: ALLOW_UNSIGNED_TAURI_UPDATER=1 bash scripts/package-linux-tauri-x86_64.sh
      - name: Smoke Linux Tauri AppImage with xvfb
        shell: bash
        run: |
          set -euo pipefail
          appimage="$(find dist -maxdepth 1 -name 'NexusHub-*-Linux-x86_64.AppImage' -print | sort | tail -n 1)"
          test -x "${appimage}"
          set +e
          xvfb-run -a env \
            APPIMAGE_EXTRACT_AND_RUN=1 \
            WEBKIT_DISABLE_COMPOSITING_MODE=1 \
            WEBKIT_DISABLE_DMABUF_RENDERER=1 \
            timeout 20s "${appimage}"
          status="$?"
          set -e
          if [[ "${status}" != "0" && "${status}" != "124" ]]; then
            echo "Linux Tauri smoke failed with status ${status}" >&2
            exit "${status}"
          fi
