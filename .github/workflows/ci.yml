name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: corepack pnpm@11.0.8 --dir webui install
      - run: corepack pnpm@11.0.8 --dir webui test
      - run: corepack pnpm@11.0.8 --dir webui build
      - run: corepack pnpm@11.0.8 --dir desktop-ui install
      - run: corepack pnpm@11.0.8 --dir desktop-ui test
      - run: corepack pnpm@11.0.8 --dir desktop-ui build
      - run: bash scripts/test-install-script.sh
